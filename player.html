<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>YouTube Player</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/api.js" defer></script>
    <script src="./js/player.js" defer></script>
</head>
<body>
    <form id="playerForm">
        <label class="sr-only" for="favoriteName">즐겨찾기명</label>
        <input id="favoriteName" type="text" maxlength="60" autocomplete="off"
            placeholder="즐겨찾기명">
        <label class="sr-only" for="youtubeUrl">유튜브 영상 주소</label>
        <input id="youtubeUrl" type="url" inputmode="url" autocomplete="off"
            placeholder="YouTube 주소를 입력하세요" required>
        <div class="actions">
            <button class="play" type="submit">재생</button>
            <button class="stop" id="stopButton" type="button">정지</button>
        </div>
        <label class="volume-control" for="volume">
            <span class="volume-label">음량 <output id="volumeValue">100%</output></span>
            <input id="volume" type="range" min="0" max="100" step="1" value="100">
        </label>
    </form>
    <section class="favorites" aria-labelledby="favoritesTitle">
        <div class="favorites-heading">
            <strong id="favoritesTitle">즐겨찾기</strong>
            <button class="favorite-add" id="favoriteAddButton" type="button">현재 주소 추가</button>
        </div>
        <div class="favorites-list" id="favoritesList">
            <p class="favorites-empty">즐겨찾기를 불러오는 중…</p>
        </div>
    </section>
    <p class="status" id="status" aria-live="polite">플레이어 준비 중…</p>
    <div id="youtubePlayer" aria-hidden="true"></div>
</body>
</html>
